<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BP Debate Timer</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #e8c84a;
      --accent2: #4ae8c8;
      --warn: #e87a4a;
      --danger: #e84a4a;
      --text: #e0e0f0;
      --muted: #666680;
      --gov: #4a8ce8;
      --opp: #e84a8c;
      --poi: #4a9de8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
      overflow-x: hidden;
      transition: background 0.4s;
    }
    body.poi-active { background: #040d1a; }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .container { position: relative; z-index: 1; width: 100%; max-width: 800px; }

    header { text-align: center; margin-bottom: 1.5rem; }
    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      letter-spacing: 0.18em;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 0.25rem;
    }

    /* TIMER CARD */
    .timer-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, background 0.4s, box-shadow 0.4s;
    }
    .timer-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gov), var(--accent), var(--opp));
      opacity: 0.6;
      transition: background 0.4s;
    }
    .timer-card.gov-side  { border-color: rgba(74,140,232,0.3); }
    .timer-card.opp-side  { border-color: rgba(232,74,140,0.3); }
    .timer-card.green   { border-color: rgba(62,232,122,0.35); }
    .timer-card.warning { border-color: rgba(232,122,74,0.5); }
    .timer-card.danger    { border-color: rgba(232,74,74,0.5); }
    .timer-card.poi-live  {
      border-color: rgba(74,157,232,0.7) !important;
      background: #0a1828;
      box-shadow: 0 0 50px rgba(74,157,232,0.12);
    }
    .timer-card.poi-live::before {
      background: linear-gradient(90deg, #0d3a6e, #4a9de8, #0d3a6e);
      opacity: 1;
    }

    /* Speaker meta */
    .speaker-meta {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .speech-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      color: var(--muted);
    }
    .speaker-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      letter-spacing: 0.05em;
      line-height: 1.1;
    }
    .speaker-name.gov { color: var(--gov); }
    .speaker-name.opp { color: var(--opp); }
    .team-tag {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.2rem 0.6rem;
      border-radius: 2px;
      font-weight: 500;
    }
    .team-tag.gov { background: rgba(74,140,232,0.15); color: var(--gov); border: 1px solid rgba(74,140,232,0.3); }
    .team-tag.opp { background: rgba(232,74,140,0.15); color: var(--opp); border: 1px solid rgba(232,74,140,0.3); }
    .team-tag.cg  { background: rgba(74,140,232,0.08); color: #7ab0f0; border: 1px solid rgba(74,140,232,0.2); }
    .team-tag.co  { background: rgba(232,74,140,0.08); color: #f07ab0; border: 1px solid rgba(232,74,140,0.2); }

    /* Main clock */
    .clock-display { text-align: center; margin: 0.5rem 0; }
    .clock {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(7rem, 28vw, 13rem);
      letter-spacing: 0.05em;
      line-height: 1;
      transition: color 0.3s;
      color: var(--text);
    }
    .clock.green   { color: #3ee87a; }
    .clock.warning { color: var(--warn); }
    .clock.danger  { color: var(--danger); animation: pulse 0.8s ease-in-out infinite; }
    .clock.poi     { color: var(--poi) !important; animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    /* POI countdown display */
    .poi-clock-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      margin: 0.25rem 0 0.75rem;
    }
    .poi-clock-wrap.visible { display: flex; }
    .poi-clock-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--poi);
      opacity: 0.8;
      margin-bottom: 0.15rem;
    }
    .poi-clock {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 8vw, 4rem);
      color: var(--poi);
      letter-spacing: 0.05em;
      line-height: 1;
      animation: poiPulse 1s ease-in-out infinite;
    }
    @keyframes poiPulse { 0%,100%{opacity:1} 50%{opacity:0.55} }

    /* POI zone band */
    .poi-band {
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.4rem;
      border-radius: 2px;
      margin: 0.5rem 0;
      transition: all 0.3s;
    }
    .poi-band.active {
      background: rgba(232,200,74,0.12);
      color: var(--accent);
      border: 1px solid rgba(232,200,74,0.3);
    }
    .poi-band.inactive {
      background: transparent;
      color: var(--muted);
      border: 1px solid transparent;
    }
    .poi-band.poi-running {
      background: rgba(74,157,232,0.12) !important;
      color: var(--poi) !important;
      border: 1px solid rgba(74,157,232,0.4) !important;
    }

    /* Progress bar */
    .progress-track {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 1rem 0 1.5rem;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--accent2);
      transition: width 0.5s linear, background 0.3s;
    }
    .progress-fill.green   { background: #3ee87a; }
    .progress-fill.warning { background: var(--warn); }
    .progress-fill.danger  { background: var(--danger); }
    .progress-fill.poi     { background: var(--poi); }

    /* Buttons */
    .controls {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    button {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      border-radius: 2px;
      padding: 0.7rem 1.5rem;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: #0a0a0f; font-weight: 500; }
    .btn-primary:hover { background: #f0d060; transform: translateY(-1px); }
    .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--muted); background: rgba(255,255,255,0.03); }
    .btn-danger-soft { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-danger-soft:hover { color: var(--danger); border-color: var(--danger); }
    .btn-next { background: var(--accent2); color: #0a0a0f; font-weight: 500; }
    .btn-next:hover { background: #6af0d8; transform: translateY(-1px); }
    .btn-poi {
      background: rgba(74,157,232,0.12);
      color: var(--poi);
      border: 1px solid rgba(74,157,232,0.35);
      font-weight: 500;
    }
    .btn-poi:hover:not(:disabled) { background: rgba(74,157,232,0.22); border-color: var(--poi); transform: translateY(-1px); }
    .btn-poi:disabled { opacity: 0.25; cursor: not-allowed; }
    .btn-poi.running {
      background: rgba(74,157,232,0.28);
      border-color: var(--poi);
      animation: poiBtnGlow 1s ease-in-out infinite;
    }
    @keyframes poiBtnGlow {
      0%,100% { box-shadow: 0 0 0 0 rgba(74,157,232,0.5); }
      50%      { box-shadow: 0 0 0 5px rgba(74,157,232,0); }
    }

    /* Speech list */
    .speech-list-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.5rem;
      margin-top: 1.5rem;
    }
    .speech-list-title {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    .speech-list { list-style: none; display: flex; flex-direction: column; gap: 0.3rem; }
    .speech-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0.75rem;
      border-radius: 2px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 0.75rem;
    }
    .speech-item:hover { background: rgba(255,255,255,0.03); border-color: var(--border); }
    .speech-item.current { background: rgba(232,200,74,0.07); border-color: rgba(232,200,74,0.25); }
    .speech-item.done { opacity: 0.55; }
    .speech-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--border); }
    .speech-dot.gov { background: var(--gov); }
    .speech-dot.opp { background: var(--opp); }
    .speech-dot.cg  { background: #7ab0f0; }
    .speech-dot.co  { background: #f07ab0; }
    .speech-item-name { flex: 1; color: var(--text); }
    .speech-item.current .speech-item-name { color: var(--accent); }
    .speech-item-team { color: var(--muted); font-size: 0.65rem; min-width: 80px; }
    .speech-item-dur  { color: var(--muted); font-size: 0.65rem; min-width: 36px; text-align: right; }
    .speech-item-taken {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--accent2);
      min-width: 44px;
      text-align: right;
      letter-spacing: 0.04em;
    }

    /* Notification */
    .notification {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 0.6rem 1.5rem;
      border-radius: 2px;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      z-index: 999;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }
    .notification.show { transform: translateX(-50%) translateY(0); }
    .notification.poi-notif { border-color: var(--poi); color: var(--poi); }

    /* Done */
    .done-banner { text-align: center; padding: 2rem; }
    .done-banner h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      letter-spacing: 0.1em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .done-banner p { color: var(--muted); font-size: 0.75rem; margin-top: 0.5rem; letter-spacing: 0.1em; }

    @media (max-width: 480px) {
      .controls { gap: 0.5rem; }
      button { padding: 0.6rem 0.9rem; font-size: 0.7rem; }
      .speech-item-team { display: none; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>BP Timer</h1>
    <p>British Parliamentary Debate</p>
  </header>

  <div class="timer-card" id="timerCard">
    <div class="speaker-meta">
      <div>
        <div class="speech-number" id="speechNumber">Speech 1 of 8</div>
        <div class="speaker-name gov" id="speakerName">Prime Minister</div>
      </div>
      <span class="team-tag gov" id="teamTag">Opening Gov</span>
    </div>

    <div class="clock-display">
      <div class="clock" id="clock">0:00</div>
    </div>

    <div class="poi-clock-wrap" id="poiClockWrap">
      <div class="poi-clock-label">POI — Time Remaining</div>
      <div class="poi-clock" id="poiClock">0:15</div>
    </div>

    <div class="poi-band inactive" id="poiBand">POI Zone: 1:00 – 6:00</div>

    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>

    <div class="controls">
      <button class="btn-primary" id="btnStartStop" onclick="toggleTimer()">Start</button>
      <button class="btn-secondary" onclick="resetCurrent()">Reset</button>
      <button class="btn-poi" id="btnPoi" onclick="startPOI()" disabled>POI</button>
      <button class="btn-next" onclick="nextSpeech()">Next →</button>
      <button class="btn-danger-soft" onclick="resetAll()">Reset All</button>
    </div>
  </div>

  <div class="speech-list-card">
    <div class="speech-list-title">Round Order</div>
    <ul class="speech-list" id="speechList"></ul>
  </div>
</div>

<div class="notification" id="notification"></div>

<script>
const SPEECHES = [
  { name: "Prime Minister",        team: "Opening Gov", side: "gov", duration: 420 },
  { name: "Leader of Opposition",  team: "Opening Opp", side: "opp", duration: 420 },
  { name: "Deputy Prime Minister", team: "Opening Gov", side: "gov", duration: 420 },
  { name: "Deputy Leader of Opp.", team: "Opening Opp", side: "opp", duration: 420 },
  { name: "Member for Government", team: "Closing Gov", side: "cg",  duration: 420 },
  { name: "Member for Opposition", team: "Closing Opp", side: "co",  duration: 420 },
  { name: "Government Whip",       team: "Closing Gov", side: "cg",  duration: 420 },
  { name: "Opposition Whip",       team: "Closing Opp", side: "co",  duration: 420 },
];

const POI_ZONE_START = 60;
const POI_ZONE_END   = 360;
const POI_DURATION   = 15;

let currentIdx = 0;
let elapsed = 0;
let running = false;
let mainInterval = null;
let notifTimeout = null;
let bells = { one: false, six: false, time: false };
let overtimeBellsFired = new Set();
let timeTaken = {};   // { speechIndex: secondsElapsed }

// POI state
let poiActive = false;
let poiRemaining = POI_DURATION;
let poiInterval = null;

// Audio
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

// Restaurant-style loud bell: layered harmonics, sharp attack, long ring
function ringBell(isPoi = false) {
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    if (isPoi) {
      // Soft POI tone
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.frequency.value = 660; osc.type = 'sine';
      g.gain.setValueAtTime(0.28, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
      osc.start(now); osc.stop(now + 0.7);
      return;
    }
    // Main bell: fundamental + harmonics for metallic "ding" resonance
    const partials = [
      { freq: 1318, vol: 1.0, type: 'sine' },
      { freq: 2637, vol: 0.55, type: 'sine' },
      { freq: 1760, vol: 0.4, type: 'triangle' },
      { freq: 3520, vol: 0.25, type: 'sine' },
      { freq: 880,  vol: 0.35, type: 'sine' },
    ];
    // Compressor to keep it loud but not clipping
    const comp = ctx.createDynamicsCompressor();
    comp.threshold.value = -6;
    comp.ratio.value = 4;
    comp.connect(ctx.destination);

    partials.forEach(({ freq, vol, type }) => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      // Very fast attack, slow exponential decay — bell character
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(vol, now + 0.005);
      g.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
      osc.connect(g); g.connect(comp);
      osc.start(now); osc.stop(now + 2.5);
    });
  } catch(e) {}
}

function bell(count = 1, isPoi = false) {
  for (let i = 0; i < count; i++) setTimeout(() => ringBell(isPoi), i * 900);
}

function formatTime(s) {
  const m = Math.floor(Math.abs(s) / 60);
  const sec = Math.abs(s) % 60;
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function showNotif(msg, isPoi = false) {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.className = 'notification show' + (isPoi ? ' poi-notif' : '');
  clearTimeout(notifTimeout);
  notifTimeout = setTimeout(() => el.classList.remove('show'), 2500);
}

/* ── POI ── */
function canStartPOI() {
  return running && !poiActive && elapsed >= POI_ZONE_START && elapsed < POI_ZONE_END;
}

function startPOI() {
  if (!canStartPOI()) return;
  poiActive = true;
  poiRemaining = POI_DURATION;
  bell(1, 660);
  showNotif('POI — 15 seconds', true);
  document.getElementById('btnPoi').classList.add('running');
  document.getElementById('poiClockWrap').classList.add('visible');
  document.getElementById('poiClock').textContent = formatTime(poiRemaining);
  document.body.classList.add('poi-active');
  poiInterval = setInterval(tickPOI, 1000);
  updateUI();
}

function tickPOI() {
  poiRemaining--;
  document.getElementById('poiClock').textContent = formatTime(poiRemaining);
  if (poiRemaining <= 0) {
    endPOI();
    bell(1, true);
    showNotif('POI ended', true);
  }
}

function endPOI() {
  poiActive = false;
  clearInterval(poiInterval);
  poiInterval = null;
  document.getElementById('btnPoi').classList.remove('running');
  document.getElementById('poiClockWrap').classList.remove('visible');
  document.body.classList.remove('poi-active');
  updateUI();
}

/* ── MAIN TIMER ── */
function toggleTimer() {
  if (running) stopTimer(); else startTimer();
}

function startTimer() {
  running = true;
  mainInterval = setInterval(tickMain, 1000);
  updateUI();
}

function stopTimer() {
  running = false;
  clearInterval(mainInterval);
  if (poiActive) endPOI();
  updateUI();
}

function tickMain() {
  elapsed++;
  const sp = SPEECHES[currentIdx];
  const total = sp.duration;
  const overtimeStart = total + 15;

  if (!bells.one && elapsed === POI_ZONE_START) {
    bells.one = true; bell(1);
    showNotif('1 minute — POI zone open');
  }
  if (!bells.six && elapsed === POI_ZONE_END) {
    bells.six = true; bell(1);
    showNotif('6 minutes — POI zone closed');
    if (poiActive) endPOI();
  }
  if (!bells.time && elapsed === total) {
    bells.time = true; bell(2);
    showNotif('Time!');
  }
  if (elapsed >= overtimeStart) {
    const ot = elapsed - overtimeStart;
    if (ot % 15 === 0) {
      const i = ot / 15;
      if (!overtimeBellsFired.has(i)) {
        overtimeBellsFired.add(i);
        bell(3);
        showNotif('Overtime +' + formatTime(elapsed - total));
      }
    }
  }
  updateUI();
}

function resetCurrent() {
  stopTimer();
  elapsed = 0;
  bells = { one: false, six: false, time: false };
  overtimeBellsFired = new Set();
  updateUI();
}

function nextSpeech() {
  timeTaken[currentIdx] = elapsed;   // record time taken
  stopTimer();
  if (currentIdx < SPEECHES.length - 1) {
    currentIdx++;
    elapsed = 0;
    bells = { one: false, six: false, time: false };
    overtimeBellsFired = new Set();
    updateUI();
    showNotif(SPEECHES[currentIdx].name);
  } else {
    showNotif('Round complete!');
    renderDone();
  }
}

function jumpTo(idx) {
  stopTimer();
  currentIdx = idx;
  elapsed = 0;
  bells = { one: false, six: false, time: false };
  overtimeBellsFired = new Set();
  updateUI();
}

function resetAll() {
  stopTimer();
  currentIdx = 0; elapsed = 0;
  bells = { one: false, six: false, time: false };
  overtimeBellsFired = new Set();
  timeTaken = {};
  rebuildCard();
  updateUI();
}

/* ── UI ── */
function updateUI() {
  const sp = SPEECHES[currentIdx];
  if (!sp) return;
  const total = sp.duration;
  // Color zones: green 1:00-6:00, orange 6:00-7:00, red 7:00+
  const isOvertime = elapsed >= total;           // >= 7:00
  const isOrange   = elapsed >= POI_ZONE_END && elapsed < total; // 6:00–7:00
  const isGreen    = elapsed >= POI_ZONE_START && elapsed < POI_ZONE_END; // 1:00–6:00
  const inPoiZone  = isGreen;

  // Card
  const card = document.getElementById('timerCard');
  if (!card) return;
  card.className = 'timer-card';
  if (poiActive) {
    card.classList.add('poi-live');
  } else {
    card.classList.add(sp.side === 'opp' || sp.side === 'co' ? 'opp-side' : 'gov-side');
    if (isOvertime)    card.classList.add('danger');
    else if (isOrange) card.classList.add('warning');
    else if (isGreen)  card.classList.add('green');
  }

  // Speaker info
  document.getElementById('speechNumber').textContent = `Speech ${currentIdx + 1} of ${SPEECHES.length}`;
  const nameEl = document.getElementById('speakerName');
  nameEl.textContent = sp.name;
  nameEl.className = 'speaker-name ' + (sp.side === 'opp' || sp.side === 'co' ? 'opp' : 'gov');
  const tagEl = document.getElementById('teamTag');
  tagEl.textContent = sp.team;
  tagEl.className = 'team-tag ' + sp.side;

  // Main clock
  const clockEl = document.getElementById('clock');
  clockEl.textContent = formatTime(elapsed);
  clockEl.className = 'clock';
  if (poiActive)       clockEl.classList.add('poi');
  else if (isOvertime) clockEl.classList.add('danger');
  else if (isOrange)   clockEl.classList.add('warning');
  else if (isGreen)    clockEl.classList.add('green');

  // POI clock wrap (text updated by tickPOI directly; just show/hide)
  if (!poiActive) {
    document.getElementById('poiClock').textContent = formatTime(POI_DURATION);
  }

  // Progress bar
  const fill = document.getElementById('progressFill');
  fill.style.width = Math.min(elapsed / total, 1) * 100 + '%';
  fill.className = 'progress-fill';
  if (poiActive)       fill.classList.add('poi');
  else if (isOvertime) fill.classList.add('danger');
  else if (isOrange)   fill.classList.add('warning');
  else if (isGreen)    fill.classList.add('green');

  // POI band
  const poiBand = document.getElementById('poiBand');
  if (poiActive) {
    poiBand.className = 'poi-band poi-running';
    poiBand.textContent = '⬡ POI In Progress';
  } else {
    poiBand.className = 'poi-band ' + (inPoiZone ? 'active' : 'inactive');
    poiBand.textContent = inPoiZone ? '⬡ POI Zone Open' : 'POI Zone: 1:00 – 6:00';
  }

  // POI button
  const btnPoi = document.getElementById('btnPoi');
  btnPoi.disabled = !canStartPOI();
  if (poiActive) btnPoi.classList.add('running');
  else btnPoi.classList.remove('running');

  // Start/stop button
  document.getElementById('btnStartStop').textContent = running ? 'Pause' : 'Start';

  renderList();
}

function renderList() {
  const ul = document.getElementById('speechList');
  if (!ul) return;
  ul.innerHTML = '';
  SPEECHES.forEach((sp, i) => {
    const li = document.createElement('li');
    li.className = 'speech-item';
    if (i === currentIdx) li.classList.add('current');
    else if (i < currentIdx) li.classList.add('done');

    const taken = timeTaken[i] !== undefined ? formatTime(timeTaken[i]) : '';

    li.innerHTML = `
      <span class="speech-dot ${sp.side}"></span>
      <span class="speech-item-name">${sp.name}</span>
      <span class="speech-item-team">${sp.team}</span>
      <span class="speech-item-dur">7:00</span>
      <span class="speech-item-taken">${taken}</span>
    `;
    li.onclick = () => jumpTo(i);
    ul.appendChild(li);
  });
}

function renderDone() {
  const card = document.getElementById('timerCard');
  card.innerHTML = `
    <div class="done-banner">
      <h2>Round Complete</h2>
      <p>All speeches delivered</p>
      <button class="btn-primary" onclick="resetAll()" style="margin-top:1.5rem">New Round</button>
    </div>
  `;
}

function rebuildCard() {
  document.getElementById('timerCard').innerHTML = `
    <div class="speaker-meta">
      <div>
        <div class="speech-number" id="speechNumber">Speech 1 of 8</div>
        <div class="speaker-name gov" id="speakerName">Prime Minister</div>
      </div>
      <span class="team-tag gov" id="teamTag">Opening Gov</span>
    </div>
    <div class="clock-display">
      <div class="clock" id="clock">0:00</div>
    </div>
    <div class="poi-clock-wrap" id="poiClockWrap">
      <div class="poi-clock-label">POI — Time Remaining</div>
      <div class="poi-clock" id="poiClock">0:15</div>
    </div>
    <div class="poi-band inactive" id="poiBand">POI Zone: 1:00 – 6:00</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="controls">
      <button class="btn-primary" id="btnStartStop" onclick="toggleTimer()">Start</button>
      <button class="btn-secondary" onclick="resetCurrent()">Reset</button>
      <button class="btn-poi" id="btnPoi" onclick="startPOI()" disabled>POI</button>
      <button class="btn-next" onclick="nextSpeech()">Next →</button>
      <button class="btn-danger-soft" onclick="resetAll()">Reset All</button>
    </div>
  `;
}

// Init
updateUI();
</script>
</body>
</html>
