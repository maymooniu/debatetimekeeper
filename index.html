<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BP Debate Timer</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #e8c84a;
    --accent2: #4ae8c8;
    --warn: #e87a4a;
    --danger: #e84a4a;
    --text: #e0e0f0;
    --muted: #666680;
    --gov: #4a8ce8;
    --opp: #e84a8c;
    --poi: #4a9de8;
    --prep: #a0a0b0;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
    overflow-x: hidden;
    transition: background 0.4s;
  }

  body.poi-active { background: #040d1a; }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 1200px;
  }

  header {
    text-align: center;
    margin-bottom: 2rem;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    letter-spacing: 0.18em;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    font-size: 0.9rem;
    color: var(--muted);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 0.5rem;
  }

  .timer-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3.5rem;
    margin-bottom: 2rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, background 0.4s, box-shadow 0.4s;
  }

  .timer-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--gov), var(--accent), var(--opp));
    opacity: 0.7;
    transition: background 0.4s;
  }

  .timer-card.prep-side { border-color: rgba(160,160,176,0.3); }
  .timer-card.gov-side  { border-color: rgba(74,140,232,0.3); }
  .timer-card.opp-side  { border-color: rgba(232,74,140,0.3); }
  .timer-card.green     { border-color: rgba(62,232,122,0.35); }
  .timer-card.warning   { border-color: rgba(232,122,74,0.5); }
  .timer-card.danger    { border-color: rgba(232,74,74,0.5); }

  .timer-card.poi-live {
    border-color: rgba(74,157,232,0.7) !important;
    background: #0a1828;
    box-shadow: 0 0 50px rgba(74,157,232,0.12);
  }

  .timer-card.poi-live::before {
    background: linear-gradient(90deg, #0d3a6e, #4a9de8, #0d3a6e);
    opacity: 1;
  }

  .speaker-meta {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 2.5rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .speech-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.2em;
    color: var(--muted);
  }

  .speaker-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    letter-spacing: 0.05em;
    line-height: 1;
  }

  .speaker-name.prep { color: var(--prep); }
  .speaker-name.gov { color: var(--gov); }
  .speaker-name.opp { color: var(--opp); }

  .team-tag {
    font-size: 1rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.5rem 1rem;
    border-radius: 4px;
    font-weight: 500;
  }

  .team-tag.prep {
    background: rgba(160,160,176,0.15);
    color: var(--prep);
    border: 1px solid rgba(160,160,176,0.3);
  }

  .team-tag.gov {
    background: rgba(74,140,232,0.15);
    color: var(--gov);
    border: 1px solid rgba(74,140,232,0.3);
  }

  .team-tag.opp {
    background: rgba(232,74,140,0.15);
    color: var(--opp);
    border: 1px solid rgba(232,74,140,0.3);
  }

  .team-tag.cg {
    background: rgba(74,140,232,0.08);
    color: #7ab0f0;
    border: 1px solid rgba(74,140,232,0.2);
  }

  .team-tag.co {
    background: rgba(232,74,140,0.08);
    color: #f07ab0;
    border: 1px solid rgba(232,74,140,0.2);
  }

  .clock-display {
    text-align: center;
    margin: 1rem 0;
  }

  .clock {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(10rem, 30vw, 18rem);
    letter-spacing: 0.05em;
    line-height: 0.9;
    transition: color 0.3s;
    color: var(--text);
  }

  .clock.green   { color: #3ee87a; }
  .clock.warning { color: var(--warn); }
  .clock.danger  { color: var(--danger); animation: pulse 0.8s ease-in-out infinite; }
  .clock.poi     { color: var(--poi) !important; animation: none; }

  @keyframes pulse {
    0%,100% { opacity: 1 }
    50% { opacity: 0.5 }
  }

  .poi-clock-wrap {
    display: none;
    flex-direction: column;
    align-items: center;
    margin: 0.5rem 0 1rem;
  }

  .poi-clock-wrap.visible {
    display: flex;
  }

  .poi-clock-label {
    font-size: 0.9rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--poi);
    opacity: 0.8;
    margin-bottom: 0.3rem;
  }

  .poi-clock {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 10vw, 6rem);
    color: var(--poi);
    letter-spacing: 0.05em;
    line-height: 1;
    animation: poiPulse 1s ease-in-out infinite;
  }

  @keyframes poiPulse {
    0%,100% { opacity: 1 }
    50% { opacity: 0.55 }
  }

  .poi-band {
    text-align: center;
    font-size: 1rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.8rem;
    border-radius: 4px;
    margin: 1rem 0;
    transition: all 0.3s;
  }

  .poi-band.active {
    background: rgba(232,200,74,0.12);
    color: var(--accent);
    border: 1px solid rgba(232,200,74,0.3);
  }

  .poi-band.inactive {
    background: transparent;
    color: var(--muted);
    border: 1px solid transparent;
  }

  .poi-band.poi-running {
    background: rgba(74,157,232,0.12) !important;
    color: var(--poi) !important;
    border: 1px solid rgba(74,157,232,0.4) !important;
  }

  .progress-track {
    height: 8px;
    background: var(--border);
    border-radius: 999px;
    margin: 2rem 0 2.5rem;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 999px;
    background: var(--accent2);
    transition: width 0.5s linear, background 0.3s;
  }

  .progress-fill.green   { background: #3ee87a; }
  .progress-fill.warning { background: var(--warn); }
  .progress-fill.danger  { background: var(--danger); }
  .progress-fill.poi     { background: var(--poi); }

  .controls {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  button {
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    border-radius: 4px;
    padding: 1rem 2rem;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #0a0a0f;
    font-weight: 500;
  }

  .btn-primary:hover {
    background: #f0d060;
    transform: translateY(-1px);
  }

  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    border-color: var(--muted);
    background: rgba(255,255,255,0.03);
  }

  .btn-danger-soft {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-danger-soft:hover {
    color: var(--danger);
    border-color: var(--danger);
  }

  .btn-next {
    background: var(--accent2);
    color: #0a0a0f;
    font-weight: 500;
  }

  .btn-next:hover {
    background: #6af0d8;
    transform: translateY(-1px);
  }

  .btn-poi {
    background: rgba(74,157,232,0.12);
    color: var(--poi);
    border: 1px solid rgba(74,157,232,0.35);
    font-weight: 500;
  }

  .btn-poi:hover:not(:disabled) {
    background: rgba(74,157,232,0.22);
    border-color: var(--poi);
    transform: translateY(-1px);
  }

  .btn-poi:disabled {
    opacity: 0.25;
    cursor: not-allowed;
  }

  .speech-list-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2rem;
    margin-top: 2rem;
  }

  .speech-list-title {
    font-size: 0.9rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }

  .speech-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .speech-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.25rem;
    border-radius: 4px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 1rem;
  }

  .speech-item:hover {
    background: rgba(255,255,255,0.03);
    border-color: var(--border);
  }

  .speech-item.current {
    background: rgba(232,200,74,0.07);
    border-color: rgba(232,200,74,0.25);
  }

  .speech-item.done {
    opacity: 0.55;
  }

  .speech-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--border);
  }

  .speech-dot.prep { background: var(--prep); }
  .speech-dot.gov { background: var(--gov); }
  .speech-dot.opp { background: var(--opp); }
  .speech-dot.cg  { background: #7ab0f0; }
  .speech-dot.co  { background: #f07ab0; }

  .speech-item-name {
    flex: 1;
    color: var(--text);
  }

  .speech-item.current .speech-item-name {
    color: var(--accent);
  }

  .speech-item-team,
  .speech-item-dur,
  .speech-item-taken {
    font-size: 0.9rem;
    color: var(--muted);
  }

  .notification {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 1rem 2rem;
    border-radius: 4px;
    font-size: 1rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }

  .notification.show {
    transform: translateX(-50%) translateY(0);
  }

  .notification.poi-notif {
    border-color: var(--poi);
    color: var(--poi);
  }

  @media (max-width: 768px) {
    .timer-card {
      padding: 2rem;
    }

    .clock {
      font-size: clamp(6rem, 24vw, 10rem);
    }

    .speaker-name {
      font-size: clamp(2rem, 8vw, 3rem);
    }

    button {
      width: 100%;
    }

    .controls {
      flex-direction: column;
    }

    .speech-item-team {
      display: none;
    }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>BP Timer</h1>
    <p>British Parliamentary Debate</p>
  </header>

  <div class="timer-card" id="timerCard">
    <div class="speaker-meta">
      <div>
        <div class="speech-number" id="speechNumber">Phase 1 of 9</div>
        <div class="speaker-name prep" id="speakerName">Case Building</div>
      </div>
      <span class="team-tag prep" id="teamTag">All Teams</span>
    </div>

    <div class="clock-display">
      <div class="clock" id="clock">0:00</div>
    </div>

    <div class="poi-clock-wrap" id="poiClockWrap">
      <div class="poi-clock-label">POI — Time Remaining</div>
      <div class="poi-clock" id="poiClock">0:15</div>
    </div>

    <div class="poi-band inactive" id="poiBand">Prep Time — No POIs</div>

    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>

    <div class="controls">
      <button class="btn-primary" id="btnStartStop" onclick="toggleTimer()">Start</button>
      <button class="btn-secondary" onclick="resetCurrent()">Reset</button>
      <button class="btn-poi" id="btnPoi" onclick="startPOI()" disabled>POI</button>
      <button class="btn-next" onclick="nextSpeech()">Next →</button>
      <button class="btn-danger-soft" onclick="resetAll()">Reset All</button>
    </div>
  </div>

  <div class="speech-list-card">
    <div class="speech-list-title">Round Order</div>
    <ul class="speech-list" id="speechList"></ul>
  </div>
</div>

<div class="notification" id="notification"></div>

<script>
const SPEECHES = [
  { name: "Case Building",         team: "All Teams", side: "prep", duration: 900, isPrep: true },
  { name: "Prime Minister",        team: "Opening Gov", side: "gov", duration: 420 },
  { name: "Leader of Opposition",  team: "Opening Opp", side: "opp", duration: 420 },
  { name: "Deputy Prime Minister", team: "Opening Gov", side: "gov", duration: 420 },
  { name: "Deputy Leader of Opp.", team: "Opening Opp", side: "opp", duration: 420 },
  { name: "Member for Government", team: "Closing Gov", side: "cg",  duration: 420 },
  { name: "Member for Opposition", team: "Closing Opp", side: "co",  duration: 420 },
  { name: "Government Whip",       team: "Closing Gov", side: "cg",  duration: 420 },
  { name: "Opposition Whip",       team: "Closing Opp", side: "co",  duration: 420 },
];

const POI_ZONE_START = 60;
const POI_ZONE_END   = 360;
const POI_DURATION   = 15;

let currentIdx = 0;
let elapsed = 0;
let running = false;
let mainInterval = null;
let notifTimeout = null;
let bells = { one: false, six: false, time: false };
let overtimeBellsFired = new Set();
let timeTaken = {};   // { speechIndex: secondsElapsed }

// POI state
let poiActive = false;
let poiRemaining = POI_DURATION;
let poiInterval = null;

// Audio
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

// Restaurant-style loud bell: layered harmonics, sharp attack, long ring
function ringBell(isPoi = false) {
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;

    // POI bell = softer short ding
    if (isPoi) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = 'triangle';
      osc.frequency.setValueAtTime(1200, now);

      gain.gain.setValueAtTime(0.001, now);
      gain.gain.exponentialRampToValueAtTime(0.25, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 1);

      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.start(now);
      osc.stop(now + 1);

      return;
    }

    // RESTAURANT / HOTEL COUNTER BELL SOUND
    // Metallic layered harmonics

    const master = ctx.createGain();
    master.gain.value = 0.9;
    master.connect(ctx.destination);

    const compressor = ctx.createDynamicsCompressor();
    compressor.threshold.value = -10;
    compressor.knee.value = 10;
    compressor.ratio.value = 8;
    compressor.attack.value = 0.003;
    compressor.release.value = 0.25;

    compressor.connect(master);

    const partials = [
      { freq: 880,  vol: 1.0, type: 'sine' },
      { freq: 1320, vol: 0.7, type: 'triangle' },
      { freq: 1760, vol: 0.45, type: 'sine' },
      { freq: 2200, vol: 0.25, type: 'triangle' },
      { freq: 2640, vol: 0.18, type: 'sine' }
    ];

    partials.forEach(p => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = p.type;
      osc.frequency.setValueAtTime(p.freq, now);

      // Sharp hit
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(p.vol, now + 0.003);

      // Long metallic decay
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 3);

      osc.connect(gain);
      gain.connect(compressor);

      osc.start(now);
      osc.stop(now + 3);
    });

    // Add "click" attack for realism
    const clickBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.02, ctx.sampleRate);
    const data = clickBuffer.getChannelData(0);

    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.exp(-i / 80);
    }

    const click = ctx.createBufferSource();
    click.buffer = clickBuffer;

    const clickGain = ctx.createGain();
    clickGain.gain.value = 0.18;

    click.connect(clickGain);
    clickGain.connect(compressor);

    click.start(now);

  } catch (e) {
    console.log(e);
  }
}

function bell(count = 1, isPoi = false) {
  for (let i = 0; i < count; i++) setTimeout(() => ringBell(isPoi), i * 900);
}

function formatTime(s) {
  const m = Math.floor(Math.abs(s) / 60);
  const sec = Math.abs(s) % 60;
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function showNotif(msg, isPoi = false) {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.className = 'notification show' + (isPoi ? ' poi-notif' : '');
  clearTimeout(notifTimeout);
  notifTimeout = setTimeout(() => el.classList.remove('show'), 2500);
}

/* ── POI ── */
function canStartPOI() {
  const sp = SPEECHES[currentIdx];
  if (sp.isPrep) return false;
  return running && !poiActive && elapsed >= POI_ZONE_START && elapsed < POI_ZONE_END;
}

function startPOI() {
  if (!canStartPOI()) return;
  poiActive = true;
  poiRemaining = POI_DURATION;
  bell(1, 660);
  showNotif('POI — 15 seconds', true);
  document.getElementById('btnPoi').classList.add('running');
  document.getElementById('poiClockWrap').classList.add('visible');
  document.getElementById('poiClock').textContent = formatTime(poiRemaining);
  document.body.classList.add('poi-active');
  poiInterval = setInterval(tickPOI, 1000);
  updateUI();
}

function tickPOI() {
  poiRemaining--;
  document.getElementById('poiClock').textContent = formatTime(poiRemaining);
  if (poiRemaining <= 0) {
    endPOI();
    bell(1, true);
    showNotif('POI ended', true);
  }
}

function endPOI() {
  poiActive = false;
  clearInterval(poiInterval);
  poiInterval = null;
  document.getElementById('btnPoi').classList.remove('running');
  document.getElementById('poiClockWrap').classList.remove('visible');
  document.body.classList.remove('poi-active');
  updateUI();
}

/* ── MAIN TIMER ── */
function toggleTimer() {
  if (running) stopTimer(); else startTimer();
}

function startTimer() {
  running = true;
  mainInterval = setInterval(tickMain, 1000);
  updateUI();
}

function stopTimer() {
  running = false;
  clearInterval(mainInterval);
  if (poiActive) endPOI();
  updateUI();
}

function tickMain() {
  elapsed++;
  const sp = SPEECHES[currentIdx];
  const total = sp.duration;
  const overtimeStart = total + 15;

  if (!sp.isPrep) {
    if (!bells.one && elapsed === POI_ZONE_START) {
      bells.one = true; bell(1);
      showNotif('1 minute — POI zone open');
    }
    if (!bells.six && elapsed === POI_ZONE_END) {
      bells.six = true; bell(1);
      showNotif('6 minutes — POI zone closed');
      if (poiActive) endPOI();
    }
  }

  if (!bells.time && elapsed === total) {
    bells.time = true; bell(2);
    showNotif('Time!');
  }

  if (elapsed >= overtimeStart && !sp.isPrep) {
    const ot = elapsed - overtimeStart;
    if (ot % 15 === 0) {
      const i = ot / 15;
      if (!overtimeBellsFired.has(i)) {
        overtimeBellsFired.add(i);
        bell(3);
        showNotif('Overtime +' + formatTime(elapsed - total));
      }
    }
  }
  updateUI();
}

function resetCurrent() {
  stopTimer();
  elapsed = 0;
  bells = { one: false, six: false, time: false };
  overtimeBellsFired = new Set();
  updateUI();
}

function nextSpeech() {
  timeTaken[currentIdx] = elapsed;   // record time taken
  stopTimer();
  if (currentIdx < SPEECHES.length - 1) {
    currentIdx++;
    elapsed = 0;
    bells = { one: false, six: false, time: false };
    overtimeBellsFired = new Set();
    updateUI();
    showNotif(SPEECHES[currentIdx].name);
  } else {
    showNotif('Round complete!');
    renderDone();
  }
}

function jumpTo(idx) {
  stopTimer();
  currentIdx = idx;
  elapsed = 0;
  bells = { one: false, six: false, time: false };
  overtimeBellsFired = new Set();
  updateUI();
}

function resetAll() {
  stopTimer();
  currentIdx = 0; elapsed = 0;
  bells = { one: false, six: false, time: false };
  overtimeBellsFired = new Set();
  timeTaken = {};
  rebuildCard();
  updateUI();
}

/* ── UI ── */
function updateUI() {
  const sp = SPEECHES[currentIdx];
  if (!sp) return;
  const total = sp.duration;
  
  const isOvertime = elapsed >= total;
  let isOrange = false;
  let isGreen = false;
  let inPoiZone = false;

  if (!sp.isPrep) {
    isOrange = elapsed >= POI_ZONE_END && elapsed < total;
    isGreen = elapsed >= POI_ZONE_START && elapsed < POI_ZONE_END;
    inPoiZone = isGreen;
  } else {
    // For case building, turn orange at 14 minutes
    isOrange = elapsed >= (total - 60) && elapsed < total;
  }

  // Card
  const card = document.getElementById('timerCard');
  if (!card) return;
  card.className = 'timer-card';
  if (poiActive) {
    card.classList.add('poi-live');
  } else {
    card.classList.add(sp.side === 'prep' ? 'prep-side' : (sp.side === 'opp' || sp.side === 'co' ? 'opp-side' : 'gov-side'));
    if (isOvertime)    card.classList.add('danger');
    else if (isOrange) card.classList.add('warning');
    else if (isGreen)  card.classList.add('green');
  }

  // Speaker info
  document.getElementById('speechNumber').textContent = sp.isPrep ? `Phase ${currentIdx + 1} of ${SPEECHES.length}` : `Speech ${currentIdx} of ${SPEECHES.length - 1}`;
  const nameEl = document.getElementById('speakerName');
  nameEl.textContent = sp.name;
  nameEl.className = 'speaker-name ' + (sp.side === 'prep' ? 'prep' : (sp.side === 'opp' || sp.side === 'co' ? 'opp' : 'gov'));
  const tagEl = document.getElementById('teamTag');
  tagEl.textContent = sp.team;
  tagEl.className = 'team-tag ' + sp.side;

  // Main clock
  const clockEl = document.getElementById('clock');
  clockEl.textContent = formatTime(elapsed);
  clockEl.className = 'clock';
  if (poiActive)       clockEl.classList.add('poi');
  else if (isOvertime) clockEl.classList.add('danger');
  else if (isOrange)   clockEl.classList.add('warning');
  else if (isGreen)    clockEl.classList.add('green');

  // POI clock wrap
  if (!poiActive) {
    document.getElementById('poiClock').textContent = formatTime(POI_DURATION);
  }

  // Progress bar
  const fill = document.getElementById('progressFill');
  fill.style.width = Math.min(elapsed / total, 1) * 100 + '%';
  fill.className = 'progress-fill';
  if (poiActive)       fill.classList.add('poi');
  else if (isOvertime) fill.classList.add('danger');
  else if (isOrange)   fill.classList.add('warning');
  else if (isGreen)    fill.classList.add('green');

  // POI band
  const poiBand = document.getElementById('poiBand');
  if (sp.isPrep) {
    poiBand.className = 'poi-band inactive';
    poiBand.textContent = 'Prep Time — No POIs';
  } else {
    if (poiActive) {
      poiBand.className = 'poi-band poi-running';
      poiBand.textContent = '⬡ POI In Progress';
    } else {
      poiBand.className = 'poi-band ' + (inPoiZone ? 'active' : 'inactive');
      poiBand.textContent = inPoiZone ? '⬡ POI Zone Open' : 'POI Zone: 1:00 – 6:00';
    }
  }

  // POI button
  const btnPoi = document.getElementById('btnPoi');
  btnPoi.disabled = !canStartPOI();
  if (poiActive) btnPoi.classList.add('running');
  else btnPoi.classList.remove('running');

  // Start/stop button
  document.getElementById('btnStartStop').textContent = running ? 'Pause' : 'Start';

  renderList();
}

function renderList() {
  const ul = document.getElementById('speechList');
  if (!ul) return;
  ul.innerHTML = '';
  SPEECHES.forEach((sp, i) => {
    const li = document.createElement('li');
    li.className = 'speech-item';
    if (i === currentIdx) li.classList.add('current');
    else if (i < currentIdx) li.classList.add('done');

    const taken = timeTaken[i] !== undefined ? formatTime(timeTaken[i]) : '';

    li.innerHTML = `
      <span class="speech-dot ${sp.side}"></span>
      <span class="speech-item-name">${sp.name}</span>
      <span class="speech-item-team">${sp.team}</span>
      <span class="speech-item-dur">${formatTime(sp.duration)}</span>
      <span class="speech-item-taken">${taken}</span>
    `;
    li.onclick = () => jumpTo(i);
    ul.appendChild(li);
  });
}

function renderDone() {
  const card = document.getElementById('timerCard');
  card.innerHTML = `
    <div class="done-banner">
      <h2>Round Complete</h2>
      <p>All speeches delivered</p>
      <button class="btn-primary" onclick="resetAll()" style="margin-top:1.5rem">New Round</button>
    </div>
  `;
}

function rebuildCard() {
  document.getElementById('timerCard').innerHTML = `
    <div class="speaker-meta">
      <div>
        <div class="speech-number" id="speechNumber">Phase 1 of 9</div>
        <div class="speaker-name prep" id="speakerName">Case Building</div>
      </div>
      <span class="team-tag prep" id="teamTag">All Teams</span>
    </div>
    <div class="clock-display">
      <div class="clock" id="clock">0:00</div>
    </div>
    <div class="poi-clock-wrap" id="poiClockWrap">
      <div class="poi-clock-label">POI — Time Remaining</div>
      <div class="poi-clock" id="poiClock">0:15</div>
    </div>
    <div class="poi-band inactive" id="poiBand">Prep Time — No POIs</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="controls">
      <button class="btn-primary" id="btnStartStop" onclick="toggleTimer()">Start</button>
      <button class="btn-secondary" onclick="resetCurrent()">Reset</button>
      <button class="btn-poi" id="btnPoi" onclick="startPOI()" disabled>POI</button>
      <button class="btn-next" onclick="nextSpeech()">Next →</button>
      <button class="btn-danger-soft" onclick="resetAll()">Reset All</button>
    </div>
  `;
}

// Init
updateUI();
</script>
</body>
</html>
